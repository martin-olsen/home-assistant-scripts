blueprint:
  name: IKEA Rodret Dimmer Control
  description: Control lights with IKEA Rodret dimmer via zigbee2mqtt
  domain: automation
  input:
    rodret_device:
      name: Rodret Device
      description: Select any entity from your IKEA Rodret device
      selector:
        entity:
          filter:
            - integration: mqtt
          integration: mqtt
    light_entity:
      name: Light
      description: Select the light to control
      selector:
        entity:
          filter:
            - domain: light
    brightness_step:
      name: Brightness Step
      description: Percentage to increase/decrease brightness per step
      default: 10
      selector:
        number:
          min: 1
          max: 25
          step: 1
          unit_of_measurement: "%"
    step_delay:
      name: Step Delay
      description: Delay between brightness steps in milliseconds
      default: 250
      selector:
        number:
          min: 100
          max: 1000
          step: 50
          unit_of_measurement: "ms"

mode: restart
max_exceeded: silent

trigger:
  - platform: mqtt
    topic: zigbee2mqtt/+/action

variables:
  light: !input light_entity
  step_pct: !input brightness_step
  delay_ms: !input step_delay
  rodret_entity: !input rodret_device
  mqtt_device_name: "{{ states[rodret_entity].attributes.friendly_name.split(' ')[0] if rodret_entity in states else '' }}"

condition:
  - condition: template
    value_template: "{{ trigger.topic.split('/')[1] == mqtt_device_name }}"

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'on' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ light }}"
      
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'off' }}"
        sequence:
          - service: light.turn_off
            target:
              entity_id: "{{ light }}"
      
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'brightness_move_up' }}"
        sequence:
          - repeat:
              sequence:
                - condition: template
                  value_template: "{{ state_attr(light, 'brightness') | int(0) < 255 }}"
                - service: light.turn_on
                  target:
                    entity_id: "{{ light }}"
                  data:
                    brightness_step_pct: "{{ step_pct }}"
                - delay:
                    milliseconds: "{{ delay_ms }}"
              until:
                - condition: template
                  value_template: "{{ false }}"
      
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'brightness_move_down' }}"
        sequence:
          - repeat:
              sequence:
                - condition: template
                  value_template: "{{ state_attr(light, 'brightness') | int(255) > 1 }}"
                - service: light.turn_on
                  target:
                    entity_id: "{{ light }}"
                  data:
                    brightness_step_pct: "{{ step_pct * -1 }}"
                - delay:
                    milliseconds: "{{ delay_ms }}"
              until:
                - condition: template
                  value_template: "{{ false }}"
      
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'brightness_stop' }}"
        sequence:
          - delay:
              milliseconds: 1