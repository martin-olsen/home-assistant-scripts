blueprint:
  name: IKEA Styrbar Light Controller with Cycling
  description: |
    Control lights with IKEA Styrbar remote via Zigbee2MQTT.
    - On/Off/Brightness controls all lights by default
    - Arrow keys cycle through individual lights (2 second timeout)
    - Selected light blinks when cycling
    - Returns to "all lights" mode after 2 seconds of inactivity
  domain: automation
  source_url: https://github.com/martin-olsen/home-assistant-scripts/blob/main/blueprints/automation/ikea_styrbar_lights.yaml
  input:
    styrbar_device:
      name: Styrbar Device
      description: Select your IKEA Styrbar remote
      selector:
        device:
          integration: mqtt
          manufacturer: IKEA
          model: STYRBAR remote control
    target_lights:
      name: Target Lights
      description: Select all lights to control
      selector:
        entity:
          domain: light
          integration: mqtt
          multiple: true
    cycle_timer:
      name: Cycle Timer Helper
      description: Timer helper for tracking cycle timeout (create one with 2 second duration)
      selector:
        entity:
          domain: timer
    cycle_counter:
      name: Cycle Counter Helper
      description: Counter helper to track current light index (create a counter helper)
      selector:
        entity:
          domain: counter
    cycle_timeout:
      name: Cycle Timeout (seconds)
      description: Time in seconds before returning to "all lights" mode
      default: 2
      selector:
        number:
          min: 1
          max: 10
          step: 1
          unit_of_measurement: seconds
    brightness_move_rate:
      name: Brightness Move Rate
      description: Speed of brightness change (units per second, 1-255)
      default: 80
      selector:
        number:
          min: 10
          max: 255
          step: 10

mode: restart
max_exceeded: silent

variables:
  styrbar_device_id: !input styrbar_device
  lights: !input target_lights
  timer_entity: !input cycle_timer
  counter_entity: !input cycle_counter
  timeout_seconds: !input cycle_timeout
  move_rate: !input brightness_move_rate
  styrbar_entities: "{{ device_entities(styrbar_device_id) }}"
  styrbar_entity: "{{ styrbar_entities | select('search', 'battery|voltage|identify') | first }}"
  mqtt_device_name: "{{ styrbar_entity.split('.')[1].replace('_battery', '').replace('_voltage', '').replace('_identify', '') }}"
  light_mqtt_names: "{{ lights | map('replace', 'light.', '') | list }}"
  num_lights: "{{ lights | length }}"
  timer_active: "{{ states(timer_entity) == 'active' }}"
  current_idx: "{{ states(counter_entity) | int }}"
  current_light: "{{ lights[current_idx % num_lights] if current_idx > 0 and num_lights > 0 else none }}"
  current_light_mqtt: "{{ light_mqtt_names[current_idx % num_lights] if current_idx > 0 and num_lights > 0 else none }}"
  all_mode: "{{ current_idx == 0 or not timer_active }}"

trigger:
  - platform: mqtt
    topic: zigbee2mqtt/+/action
  - platform: state
    entity_id: !input cycle_timer
    to: idle
    id: timer_expired

condition:
  - condition: or
    conditions:
      - condition: trigger
        id: timer_expired
      - condition: template
        value_template: "{{ trigger.topic.split('/')[1] == mqtt_device_name }}"

action:
  - choose:
      # Timer expired - reset to all lights mode
      - conditions:
          - condition: trigger
            id: timer_expired
        sequence:
          - service: counter.reset
            target:
              entity_id: "{{ counter_entity }}"
          - repeat:
              for_each: "{{ light_mqtt_names }}"
              sequence:
                - service: mqtt.publish
                  data:
                    topic: "zigbee2mqtt/{{ repeat.item }}/set"
                    payload: '{"effect": "blink"}'

      # ON Button - Turn on all lights
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'on' }}"
        sequence:
          - repeat:
              for_each: "{{ light_mqtt_names }}"
              sequence:
                - service: mqtt.publish
                  data:
                    topic: "zigbee2mqtt/{{ repeat.item }}/set"
                    payload: '{"state": "ON"}'

      # OFF Button - Turn off all lights
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'off' }}"
        sequence:
          - repeat:
              for_each: "{{ light_mqtt_names }}"
              sequence:
                - service: mqtt.publish
                  data:
                    topic: "zigbee2mqtt/{{ repeat.item }}/set"
                    payload: '{"state": "OFF"}'

      # BRIGHTNESS UP - Control all or selected light
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'brightness_move_up' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ all_mode }}"
                sequence:
                  - repeat:
                      for_each: "{{ light_mqtt_names }}"
                      sequence:
                        - service: mqtt.publish
                          data:
                            topic: "zigbee2mqtt/{{ repeat.item }}/set"
                            payload: '{"brightness_move": {{ move_rate }} }'
            default:
              - service: mqtt.publish
                data:
                  topic: "zigbee2mqtt/{{ current_light_mqtt }}/set"
                  payload: '{"brightness_move": {{ move_rate }} }'

      # BRIGHTNESS DOWN - Control all or selected light
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'brightness_move_down' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ all_mode }}"
                sequence:
                  - repeat:
                      for_each: "{{ light_mqtt_names }}"
                      sequence:
                        - service: mqtt.publish
                          data:
                            topic: "zigbee2mqtt/{{ repeat.item }}/set"
                            payload: '{"brightness_move": -{{ move_rate }} }'
            default:
              - service: mqtt.publish
                data:
                  topic: "zigbee2mqtt/{{ current_light_mqtt }}/set"
                  payload: '{"brightness_move": -{{ move_rate }} }'

      # BRIGHTNESS STOP - Stop brightness changes
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'brightness_stop' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ all_mode }}"
                sequence:
                  - repeat:
                      for_each: "{{ light_mqtt_names }}"
                      sequence:
                        - service: mqtt.publish
                          data:
                            topic: "zigbee2mqtt/{{ repeat.item }}/set"
                            payload: '{"brightness_move": 0}'
            default:
              - service: mqtt.publish
                data:
                  topic: "zigbee2mqtt/{{ current_light_mqtt }}/set"
                  payload: '{"brightness_move": 0}'

      # ARROW RIGHT - Cycle to next light
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'arrow_right_click' }}"
        sequence:
          # Increment counter
          - service: counter.increment
            target:
              entity_id: "{{ counter_entity }}"
          # Restart timer
          - service: timer.start
            target:
              entity_id: "{{ timer_entity }}"
            data:
              duration: "{{ '00:00:' ~ '%02d' | format(timeout_seconds | int) }}"
          - variables:
              new_idx: "{{ (current_idx + 1) % (num_lights + 1) }}"
          - choose:
              # Cycle complete - reset and blink all lights
              - conditions:
                  - condition: template
                    value_template: "{{ new_idx == 0 }}"
                sequence:
                  - service: counter.reset
                    target:
                      entity_id: "{{ counter_entity }}"
                  - service: timer.cancel
                    target:
                      entity_id: "{{ timer_entity }}"
                  - repeat:
                      for_each: "{{ light_mqtt_names }}"
                      sequence:
                        - service: mqtt.publish
                          data:
                            topic: "zigbee2mqtt/{{ repeat.item }}/set"
                            payload: '{"effect": "blink"}'
            default:
              # Blink selected light
              - service: mqtt.publish
                data:
                  topic: "zigbee2mqtt/{{ light_mqtt_names[new_idx % num_lights] }}/set"
                  payload: '{"effect": "blink"}'

      # ARROW LEFT - Cycle to previous light
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'arrow_left_click' }}"
        sequence:
          # Decrement counter (or increment to simulate going backwards)
          - service: counter.increment
            target:
              entity_id: "{{ counter_entity }}"
          # Restart timer
          - service: timer.start
            target:
              entity_id: "{{ timer_entity }}"
            data:
              duration: "{{ '00:00:' ~ '%02d' | format(timeout_seconds | int) }}"
          - variables:
              # For left, we go backwards by adding (num_lights) to simulate reverse
              new_idx: "{{ (current_idx + num_lights) % (num_lights + 1) if current_idx > 0 else num_lights }}"
          # Manually set counter to new position
          - service: counter.reset
            target:
              entity_id: "{{ counter_entity }}"
          - repeat:
              count: "{{ new_idx }}"
              sequence:
                - service: counter.increment
                  target:
                    entity_id: "{{ counter_entity }}"
          - choose:
              # Cycle complete - reset and blink all lights
              - conditions:
                  - condition: template
                    value_template: "{{ new_idx == 0 }}"
                sequence:
                  - service: timer.cancel
                    target:
                      entity_id: "{{ timer_entity }}"
                  - repeat:
                      for_each: "{{ light_mqtt_names }}"
                      sequence:
                        - service: mqtt.publish
                          data:
                            topic: "zigbee2mqtt/{{ repeat.item }}/set"
                            payload: '{"effect": "blink"}'
            default:
              # Blink selected light
              - service: mqtt.publish
                data:
                  topic: "zigbee2mqtt/{{ light_mqtt_names[new_idx % num_lights] }}/set"
                  payload: '{"effect": "blink"}'