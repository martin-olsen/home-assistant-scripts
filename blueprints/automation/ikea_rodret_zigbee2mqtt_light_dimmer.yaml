blueprint:
  name: IKEA Rodret Dimmer for zigbee2mqtt Lights
  description: Control lights with IKEA Rodret dimmer using native brightness_move commands (works with Hue, IKEA, and other lights that support brightness_move)
  domain: automation
  source_url: https://github.com/martin-olsen/home-assistant-scripts/blob/main/blueprints/automation/ikea_rodret_zigbee2mqtt_light_dimmer.yaml
  input:
    rodret_device:
      name: Rodret Device
      description: Select any entity from your IKEA Rodret dimmer (battery, voltage, or identify sensor)
      selector:
        device:
          integration: mqtt
          manufacturer: IKEA
          model: RODRET wireless dimmer/power switch
    light_entity:
      name: Light
      description: Select your light entity (must support brightness_move command via zigbee2mqtt)
      selector:
        entity:
          domain: light
          integration: mqtt
    brightness_move_rate:
      name: Brightness Move Rate
      description: Speed of brightness change (units per second, 1-255)
      default: 80
      selector:
        number:
          min: 10
          max: 255
          step: 10

mode: restart
max_exceeded: silent

trigger:
  - platform: mqtt
    topic: zigbee2mqtt/+/action

variables:
  rodret_device_id: !input rodret_device
  light_entity: !input light_entity
  move_rate: !input brightness_move_rate
  rodret_entities: "{{ device_entities(rodret_device_id) }}"
  rodret_entity: "{{ rodret_entities | select('search', 'battery|voltage|identify') | first }}"
  mqtt_device_name: "{{ state_attr(rodret_entity, 'friendly_name').split(' ')[0] if rodret_entity else '' }}"
  light_mqtt_name: "{{ light_entity.split('.')[1] }}"

condition:
  - condition: template
    value_template: "{{ trigger.topic.split('/')[1] == mqtt_device_name }}"

action:
  - choose:
      # Turn light ON
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'on' }}"
        sequence:
          - service: mqtt.publish
            data:
              topic: "zigbee2mqtt/{{ light_mqtt_name }}/set"
              payload: '{"state": "ON"}'
      
      # Turn light OFF
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'off' }}"
        sequence:
          - service: mqtt.publish
            data:
              topic: "zigbee2mqtt/{{ light_mqtt_name }}/set"
              payload: '{"state": "OFF"}'
      
      # Start increasing brightness
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'brightness_move_up' }}"
        sequence:
          - service: mqtt.publish
            data:
              topic: "zigbee2mqtt/{{ light_mqtt_name }}/set"
              payload: '{"brightness_move": {{ move_rate }} }'
      
      # Start decreasing brightness
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'brightness_move_down' }}"
        sequence:
          - service: mqtt.publish
            data:
              topic: "zigbee2mqtt/{{ light_mqtt_name }}/set"
              payload: '{"brightness_move": -{{ move_rate }} }'
      
      # Stop brightness change
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload == 'brightness_stop' }}"
        sequence:
          - service: mqtt.publish
            data:
              topic: "zigbee2mqtt/{{ light_mqtt_name }}/set"
              payload: '{"brightness_move": 0}'